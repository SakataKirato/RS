<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo Checker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel hero">
        <p class="eyebrow">Tempo Feedback</p>
        <h1>目標 BPM に対して早いか遅いかを判定</h1>
        <p class="subcopy">
          タップ間隔から現在のテンポを推定し、目標 BPM を上回ったら「早いです」、下回ったら「遅いです」と発音します。
        </p>
      </section>

      <section class="panel controls">
        <label class="field">
          <span>目標 BPM</span>
          <input id="targetBpm" type="number" min="20" max="300" value="120" />
        </label>

        <label class="field">
          <span>許容幅 ±BPM</span>
          <input id="toleranceBpm" type="number" min="1" max="30" value="3" />
        </label>

        <div class="toggle-row">
          <label class="checkbox">
            <input id="speechEnabled" type="checkbox" checked />
            <span>音声フィードバック</span>
          </label>
          <div class="button-row">
            <button id="connectButton" type="button" class="secondary">センサ接続</button>
            <button id="resetButton" type="button" class="secondary">リセット</button>
          </div>
        </div>
      </section>

      <section class="panel status-panel">
        <div class="metrics">
          <div class="metric">
            <span class="metric-label">現在 BPM</span>
            <strong id="currentBpm">--</strong>
          </div>
          <div class="metric">
            <span class="metric-label">差分</span>
            <strong id="deltaBpm">--</strong>
          </div>
        </div>
        <div class="metric single">
          <span class="metric-label">入力ソース</span>
          <strong id="inputSource">未接続</strong>
        </div>
        <div id="statusBadge" class="status neutral">タップ待機中</div>
        <p class="hint">Chrome 系ブラウザで「センサ接続」を押し、Arduino のシリアルポートを選択してください。</p>
      </section>

      <section class="panel log-panel">
        <div class="log-header">
          <h2>ログ</h2>
          <button id="clearLogButton" type="button" class="secondary">ログを消去</button>
        </div>
        <div id="logList" class="log-list" aria-live="polite">
          <p class="log-empty">まだログはありません。</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
